name: Kubernetes Deployment

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }} \
        -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest .

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    - name: Copy Kubernetes Files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.K8S_MASTER_HOST }}
        username: ${{ secrets.K8S_MASTER_USER }}
        key: ${{ secrets.K8S_MASTER_SSH_KEY }}
        source: "k8s/*"
        target: "/home/ec2-user/train-schedule"

    - name: Deploy to Kubernetes
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.K8S_MASTER_HOST }}
        username: ${{ secrets.K8S_MASTER_USER }}
        key: ${{ secrets.K8S_MASTER_SSH_KEY }}

        script: |

          cd /home/ec2-user/train-schedule

          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}|g" k8s/deployment.yaml

          kubectl apply -f k8s/namespace.yaml

          kubectl apply -f k8s/deployment.yaml

          kubectl apply -f k8s/service.yaml

          kubectl rollout status deployment/python-app \
          --timeout=300s

          kubectl get pods

          kubectl get svc
