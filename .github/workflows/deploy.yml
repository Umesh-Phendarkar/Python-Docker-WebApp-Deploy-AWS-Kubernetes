name: Build and Deploy Python Application

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest .

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    - name: Copy Kubernetes Files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.K8S_MASTER_HOST }}
        username: ${{ secrets.K8S_MASTER_USER }}
        key: ${{ secrets.K8S_MASTER_SSH_KEY }}
        source: "k8s/*"
        target: "/home/ec2-user/python-app"

    - name: Deploy to Kubernetes
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.K8S_MASTER_HOST }}
        username: ${{ secrets.K8S_MASTER_USER }}
        key: ${{ secrets.K8S_MASTER_SSH_KEY }}
        script: |

          cd /home/ec2-user/python-app

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

          kubectl set image deployment/python-app \
          python-app=${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }}

          kubectl rollout status deployment/python-app --timeout=300s

          echo "================ Pods ================"
          kubectl get pods -o wide

          echo "============== Deployment ============"
          kubectl get deployment

          echo "=============== Services ============="
          kubectl get svc
