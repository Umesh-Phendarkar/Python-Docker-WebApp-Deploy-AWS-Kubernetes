name: Build and Deploy

on:

  push:

    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout

      uses: actions/checkout@v4

    - name: Login DockerHub

      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image

      run: |

        docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }} .

        docker tag ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }} \
        ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    - name: Push Docker Image

      run: |

        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.sha }}

        docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    - name: Setup kubectl

      uses: azure/setup-kubectl@v4

      with:

        version: latest

    - name: Configure kubeconfig

      run: |

        mkdir -p ~/.kube

        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

    - name: Update deployment image

      run: |

        sed -i "s|YOUR_DOCKERHUB_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" k8s/deployment.yaml

    - name: Deploy

      run: |

        kubectl apply -f k8s/deployment.yaml

        kubectl apply -f k8s/service.yaml

        kubectl rollout status deployment/python-app
