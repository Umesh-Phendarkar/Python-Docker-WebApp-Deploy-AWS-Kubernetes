apiVersion: apps/v1

kind: Deployment

metadata:
  name: python-app

spec:

  replicas: 2

  selector:
    matchLabels:
      app: python-app

  template:

    metadata:

      labels:
        app: python-app

    spec:

      containers:

      - name: python-app

        image: secrets.DOCKER_USERNAME/python-app:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 5000

        readinessProbe:

          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:

          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 20
